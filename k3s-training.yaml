apiVersion: v1
kind: Pod
metadata:
  name: training 
spec:
  containers:
  - image: ghcr.io/thomasfricke/training/jupyterlab
    imagePullPolicy: IfNotPresent
    name: training
    env:
    - name: CONTAINER_RUNTIME_ENDPOINT
      value: "unix:///host/run/k3s/containerd/containerd.sock"
    - name: PATH
      value: "/usr/sbin:/usr/bin:/usr/local/bin/:/usr/local/go/bin:/host/data/go/bin:/host/bin/:/host/sbin"
    - name: GOROOT
      value: "/usr/local/go"
    - name: GOPATH
      value: "/host/data/go"
    - name: JUPYTERLAB_PORT
      value: "8889"
    - name: KUBECONFIG
      value: "/host/output/kubeconfig.yaml"
    - name: JUPYTERLAB_TOKEN
      valueFrom:
        secretKeyRef:
          name: training
          key: token
    resources: {}
    securityContext:
      privileged: true
    stdin: true
    terminationMessagePath: /dev/termination-log
    terminationMessagePolicy: File
    tty: true
    volumeMounts:
    - mountPath: /host
      name: host-root
    - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      name: kube-api-access
      readOnly: true
  dnsPolicy: ClusterFirst
  enableServiceLinks: true
  hostIPC: true
  hostNetwork: true
  hostPID: true
  nodeName: k3d-host-cluster-server-0
  preemptionPolicy: PreemptLowerPriority
  priority: 0
  restartPolicy: Always
  schedulerName: default-scheduler
  securityContext: {}
  serviceAccount: default
  serviceAccountName: default
  terminationGracePeriodSeconds: 30
  tolerations:
  - operator: Exists
  volumes:
  - hostPath:
      path: /
      type: ""
    name: host-root
  - name: kube-api-access
    projected:
      defaultMode: 420
      sources:
      - serviceAccountToken:
          expirationSeconds: 3607
          path: token
      - configMap:
          items:
          - key: ca.crt
            path: ca.crt
          name: kube-root-ca.crt
      - downwardAPI:
          items:
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
            path: namespace

